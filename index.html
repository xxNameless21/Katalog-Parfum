    // --- APLIKASI UTAMA ---
    function App() {
      const [currentView, setCurrentView] = useState('katalog'); // 'katalog' | 'cart' | 'payment'
      
      const [cart, setCart] = useState(() => {
        try {
          const savedCart = localStorage.getItem('parfumCart');
          return savedCart ? JSON.parse(savedCart) : [];
        } catch (error) { return []; }
      });

      useEffect(() => {
        localStorage.setItem('parfumCart', JSON.stringify(cart));
      }, [cart]);

      // States
      const [activeItem, setActiveItem] = useState(null);
      const [priceInfoCategory, setPriceInfoCategory] = useState(null);
      const [formConfig, setFormConfig] = useState({ ml: '', kualitas: '' });
      
      // Checkout States
      const [noHp, setNoHp] = useState('');
      const [phoneError, setPhoneError] = useState('');
      const [isCheckingOut, setIsCheckingOut] = useState(false);
      const [orderId, setOrderId] = useState('');
      
      const [toastMessage, setToastMessage] = useState('');
      const [searchQuery, setSearchQuery] = useState('');
      const [collapsedCategories, setCollapsedCategories] = useState({
        'Abu-Abu': true, 'Biru Muda': true, 'Hitam': true
      });

      const totalCartItems = cart.reduce((sum, item) => sum + item.quantity, 0);
      const totalCartPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

      const showToast = (message) => {
        setToastMessage(message);
        setTimeout(() => setToastMessage(''), 3000);
      };

      const copyToClipboard = (text) => {
        const el = document.createElement('textarea');
        el.value = text;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        showToast('Nomor rekening disalin!');
      };

      const openAddToCartModal = (parfumName, categoryName) => {
        setActiveItem({ name: parfumName, category: categoryName });
        setFormConfig({ ml: '', kualitas: '' });
      };

      const handleAddToCart = () => {
        if (!formConfig.ml || !formConfig.kualitas) return;
        const price = pricingData[activeItem.category][formConfig.kualitas][formConfig.ml];
        const newItem = { ...activeItem, ml: formConfig.ml, kualitas: formConfig.kualitas, price: price };

        setCart(prevCart => {
          const existingItemIndex = prevCart.findIndex(i => i.name === newItem.name && i.ml === newItem.ml && i.kualitas === newItem.kualitas);
          if (existingItemIndex >= 0) {
            const newCart = [...prevCart];
            newCart[existingItemIndex].quantity += 1;
            return newCart;
          } else {
            return [...prevCart, { ...newItem, quantity: 1 }];
          }
        });

        showToast(`${activeItem.name} ditambahkan!`);
        setActiveItem(null); 
      };

      const updateQuantity = (index, delta) => {
        setCart(prev => {
          const newCart = [...prev];
          newCart[index].quantity += delta;
          if (newCart[index].quantity <= 0) newCart.splice(index, 1);
          return newCart;
        });
      };

      const removeItem = (index) => {
        setCart(prev => {
          const newCart = [...prev];
          newCart.splice(index, 1);
          return newCart;
        });
      };

      const handlePhoneChange = (e) => {
        const value = e.target.value.replace(/\D/g, ''); 
        setNoHp(value);
        if (value.length > 0 && (value.length < 10 || value.length > 14)) {
          setPhoneError('Nomor HP tidak valid (harus 10-14 angka)');
        } else {
          setPhoneError('');
        }
      };

      const handleCheckout = async (e) => {
        e.preventDefault();
        if (cart.length === 0 || phoneError || noHp.length < 10) return;
        
        setIsCheckingOut(true);
        const newOrderId = generateOrderId();
        setOrderId(newOrderId);
        
        let itemsDetailsStr = "";
        cart.forEach((item, idx) => {
           itemsDetailsStr += `${idx+1}. ${item.name} (${item.ml}ml-${item.kualitas}) x${item.quantity}\n`;
        });

        const formData = new URLSearchParams();
        formData.append('orderId', newOrderId);
        formData.append('noHp', noHp);
        formData.append('totalPrice', formatRp(totalCartPrice));
        formData.append('itemsDetails', itemsDetailsStr);

        try {
          await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            body: formData,
            mode: 'no-cors'
          });
          setIsCheckingOut(false);
          setCurrentView('payment'); 
        } catch (error) {
          console.error("Gagal mengirim pesanan", error);
          alert("Gagal terhubung ke database. Coba lagi.");
          setIsCheckingOut(false);
        }
      };

      const handleConfirmPayment = () => {
        let waText = `Halo Kak, saya sudah melakukan *Transfer Bank* untuk pembayaran pesanan Parfum.\n\n`;
        waText += `*Order ID:* ${orderId}\n`;
        waText += `*Total Transfer:* ${formatRp(totalCartPrice)}\n\n`;
        waText += `Ini bukti transfer saya: (Silakan lampirkan gambar bukti transfer)`;
        
        const waUrl = `https://api.whatsapp.com/send?phone=${ADMIN_WA_PHONE}&text=${encodeURIComponent(waText)}`;
        window.open(waUrl, '_blank');
        
        setCart([]);
        localStorage.removeItem('parfumCart');
        setCurrentView('katalog');
      };

      const toggleCategory = (categoryName) => {
        setCollapsedCategories(prev => ({ ...prev, [categoryName]: !prev[categoryName] }));
      };

      const filteredCatalog = Object.entries(catalogData).map(([categoryName, categoryData]) => {
        const filteredItems = categoryData.items.filter(item =>
          item.toLowerCase().includes(searchQuery.toLowerCase())
        );
        return { categoryName, ...categoryData, items: filteredItems };
      }).filter(category => category.items.length > 0);

      const isCategoryOpen = (catName) => {
        if (searchQuery.trim() !== '') return true;
        return !collapsedCategories[catName];
      };

      return (
        <div className="min-h-screen font-sans text-gray-800 pb-12 relative">
          
          <header className="bg-purple-700 text-white shadow-md sticky top-0 z-30">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
              <div className="flex items-center gap-4">
                {(currentView === 'cart' || currentView === 'payment') && (
                  <button onClick={() => setCurrentView('katalog')} className="bg-purple-500 hover:bg-purple-600 text-white px-3 py-2 rounded-full text-sm font-medium transition-colors border border-purple-400 shadow-sm flex items-center gap-1">
                    <ChevronLeft size={18} />
                    <span className="hidden sm:inline">Kembali</span>
                  </button>
                )}
                <h1 className="text-xl sm:text-2xl font-bold tracking-wider cursor-pointer" onClick={() => setCurrentView('katalog')}>KATALOG PARFUM</h1>
              </div>
              
              <div className="flex items-center gap-4">
                <div className="text-purple-300 text-sm font-medium tracking-widest hidden md:block border-r border-purple-500 pr-4">CHAKAS_MRL21</div>
                <button onClick={() => setCurrentView('cart')} className="relative p-2 hover:bg-purple-600 rounded-full transition-colors flex items-center">
                  <ShoppingCart size={24} />
                  {totalCartItems > 0 && (
                    <span className="absolute top-0 right-0 bg-red-500 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full border-2 border-purple-700">
                      {totalCartItems}
                    </span>
                  )}
                </button>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">
            
            {currentView === 'katalog' && (
              <div className="animate-in fade-in duration-500">
                <div className="text-center mb-8">
                  <h2 className="text-3xl font-bold text-gray-800 mb-2">Pilih Kategori Aroma</h2>
                  <div className="w-16 h-1 bg-purple-600 mx-auto rounded mb-8"></div>
                  
                  <div className="max-w-md mx-auto relative px-4 sm:px-0 mb-6">
                    <div className="absolute inset-y-0 left-4 sm:left-0 pl-3 flex items-center pointer-events-none">
                      <SearchIcon className="text-gray-400" size={20} />
                    </div>
                    <input
                      type="text"
                      placeholder="Cari nama parfum..."
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                      className="w-full pl-10 pr-4 py-3 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent shadow-sm"
                    />
                  </div>
                </div>

                {filteredCatalog.length === 0 ? (
                  <div className="text-center text-gray-500 py-10 bg-white rounded-xl shadow-sm mx-4 sm:mx-0">
                    <SearchIcon className="mx-auto mb-3 text-gray-300" size={48} />
                    <p className="text-lg">Parfum yang Anda cari tidak ditemukan.</p>
                  </div>
                ) : (
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    {filteredCatalog.map(({ categoryName, color, textColor, items }) => (
                      <div key={categoryName} className="bg-white rounded-xl overflow-hidden shadow-md flex flex-col border border-gray-100">
                        <div className={`${color} ${textColor} p-4 relative`}>
                           <div className="flex justify-between items-center cursor-pointer" onClick={() => toggleCategory(categoryName)}>
                              <div>
                                <h3 className="font-bold text-lg flex items-center gap-2">{categoryName}</h3>
                                <div className="text-xs opacity-90 font-medium mt-0.5">Mulai {formatRp(pricingData[categoryName]['STANDAR']['35'])}</div>
                              </div>
                              <div className="flex items-center gap-3">
                                <button onClick={(e) => { e.stopPropagation(); setPriceInfoCategory(categoryName); }} className="p-1.5 bg-white/20 hover:bg-white/30 rounded-full transition-colors backdrop-blur-sm" title="Lihat Daftar Harga">
                                  <Info size={18} />
                                </button>
                                {isCategoryOpen(categoryName) ? <ChevronUp size={22} /> : <ChevronDown size={22} />}
                              </div>
                           </div>
                        </div>
                        
                        {isCategoryOpen(categoryName) && (
                          <div className="p-3 flex-grow flex flex-col gap-2 bg-gray-50 overflow-y-auto max-h-[60vh]">
                            {items.map((item, index) => (
                              <button key={index} onClick={() => openAddToCartModal(item, categoryName)} className="text-left w-full bg-white p-3 md:p-4 rounded-lg shadow-sm text-sm font-medium text-gray-700 hover:bg-purple-50 hover:text-purple-700 hover:shadow-md transition-all duration-200 border border-gray-100 hover:border-purple-200 flex justify-between items-center group uppercase">
                                <span className="pr-4">{item}</span>
                                <Plus size={18} className="text-gray-300 group-hover:text-purple-500 flex-shrink-0" />
                              </button>
                            ))}
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {currentView === 'cart' && (
              <div className="max-w-4xl mx-auto animate-in fade-in duration-300">
                <div className="bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-100">
                  <div className="bg-purple-600 p-6 text-white flex items-center gap-3">
                    <ShoppingCart size={24} />
                    <h2 className="text-2xl font-bold">Keranjang Belanja</h2>
                  </div>

                  {cart.length === 0 ? (
                    <div className="p-12 text-center text-gray-500">
                      <ShoppingBag size={64} className="mx-auto mb-4 text-gray-300" />
                      <h3 className="text-xl font-bold text-gray-700 mb-2">Keranjang Anda masih kosong</h3>
                      <button onClick={() => setCurrentView('katalog')} className="mt-4 bg-purple-600 hover:bg-purple-700 text-white font-semibold py-2 px-6 rounded-full transition-colors">Lihat Katalog</button>
                    </div>
                  ) : (
                    <div className="flex flex-col md:flex-row">
                      <div className="flex-1 p-6 md:border-r border-gray-100">
                        <h3 className="font-bold text-gray-800 mb-4 border-b pb-2">Daftar Pesanan ({totalCartItems} Item)</h3>
                        <div className="space-y-4 max-h-[50vh] overflow-y-auto pr-2">
                          {cart.map((item, index) => (
                            <div key={index} className="flex gap-4 p-4 bg-gray-50 rounded-xl border border-gray-100 relative group">
                              <div className="flex-1">
                                <h4 className="font-bold text-gray-800 text-sm md:text-base uppercase leading-tight mb-1">{item.name}</h4>
                                <div className="text-xs text-gray-500 mb-2 font-medium">Kat: {item.category} • {item.ml}ml • {item.kualitas}</div>
                                <div className="text-purple-700 font-bold text-sm">{formatRp(item.price)} <span className="text-gray-400 font-normal text-xs">/ botol</span></div>
                              </div>
                              <div className="flex flex-col items-end justify-between">
                                <button onClick={() => removeItem(index)} className="text-gray-400 hover:text-red-500 p-1 mb-2"><Trash2 size={18} /></button>
                                <div className="flex items-center bg-white border border-gray-200 rounded-lg shadow-sm">
                                  <button onClick={() => updateQuantity(index, -1)} className="p-1.5 hover:bg-gray-100 text-gray-600 rounded-l-lg"><Minus size={16}/></button>
                                  <span className="w-8 text-center text-sm font-semibold">{item.quantity}</span>
                                  <button onClick={() => updateQuantity(index, 1)} className="p-1.5 hover:bg-gray-100 text-gray-600 rounded-r-lg"><Plus size={16}/></button>
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>

                      <div className="w-full md:w-[340px] p-6 bg-gray-50/50">
                        <h3 className="font-bold text-gray-800 mb-4 border-b pb-2">Ringkasan</h3>
                        <div className="flex justify-between items-center mb-6">
                          <span className="text-gray-600">Total Harga:</span>
                          <span className="text-xl font-bold text-purple-700">{formatRp(totalCartPrice)}</span>
                        </div>

                        <form onSubmit={handleCheckout} className="space-y-4">
                          <div>
                            <label className="block text-xs font-semibold text-gray-700 mb-1">Nomor WA Anda (diawali 08/628) <span className="text-red-500">*</span></label>
                            <input type="tel" required placeholder="081234567890" value={noHp} onChange={handlePhoneChange} className={`w-full bg-white border ${phoneError ? 'border-red-500' : 'border-gray-300'} text-gray-800 rounded-lg p-2.5 focus:outline-none focus:ring-2 focus:ring-purple-500 text-sm shadow-sm`} />
                            {phoneError && <p className="text-red-500 text-xs mt-1">{phoneError}</p>}
                          </div>
                          
                          <button type="submit" disabled={!!phoneError || noHp.length < 10 || isCheckingOut} className={`w-full font-bold py-3 px-4 rounded-xl shadow-md flex justify-center items-center gap-2 transition-all ${(phoneError || noHp.length < 10 || isCheckingOut) ? 'bg-gray-300 text-gray-500 cursor-not-allowed shadow-none' : 'bg-green-500 hover:bg-green-600 text-white'}`}>
                            {isCheckingOut ? <><Loader2 size={18} /> Menyimpan ke Sistem...</> : 'Proses Pesanan & Bayar'}
                          </button>
                        </form>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* ====== TAMPILAN PEMBAYARAN TRANSFER BANK ====== */}
            {currentView === 'payment' && (
              <div className="max-w-md mx-auto animate-in slide-in-from-bottom-8 duration-500">
                <div className="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100 text-center p-8">
                   <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                      <Landmark size={32} />
                   </div>
                   <h2 className="text-2xl font-bold text-gray-800 mb-1">Pembayaran Transfer Bank</h2>
                   <p className="text-gray-500 text-sm mb-6">Silakan transfer sesuai dengan total tagihan ke salah satu rekening berikut:</p>

                   <div className="bg-gray-50 p-4 rounded-xl border border-dashed border-gray-300 mb-6 text-center">
                      <p className="text-sm text-gray-600 mb-1">Order ID:</p>
                      <p className="text-lg font-bold text-gray-800 tracking-wider mb-3">{orderId}</p>
                      <p className="text-sm text-gray-600 mb-1">Total yang harus dibayar:</p>
                      <p className="text-3xl font-extrabold text-purple-700">{formatRp(totalCartPrice)}</p>
                   </div>

                   {/* KOTAK INFORMASI REKENING */}
                   <div className="space-y-4 mb-8 text-left">
                      {INFO_REKENING.map((acc, idx) => (
                        <div key={idx} className="bg-white border-2 border-blue-50 rounded-xl p-4 shadow-sm flex justify-between items-center hover:border-blue-200 transition-colors">
                           <div>
                              <div className="font-extrabold text-lg text-blue-800 mb-1">{acc.bank}</div>
                              <div className="text-gray-800 font-mono text-xl tracking-wider font-bold">{acc.number}</div>
                              <div className="text-gray-500 text-xs font-semibold mt-1">A.N. {acc.name}</div>
                           </div>
                           <button 
                             onClick={() => copyToClipboard(acc.number)} 
                             className="p-2.5 bg-gray-100 hover:bg-blue-100 text-gray-600 hover:text-blue-600 rounded-lg transition-colors flex flex-col items-center gap-1"
                             title="Salin Rekening"
                           >
                              <Copy size={20} />
                              <span className="text-[10px] font-bold">Salin</span>
                           </button>
                        </div>
                      ))}
                   </div>

                   <div className="space-y-3">
                      <button onClick={handleConfirmPayment} className="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3.5 px-4 rounded-xl transition-all shadow-md hover:shadow-lg flex items-center justify-center gap-2 text-lg">
                        <CheckCircle2 size={20} /> Konfirmasi Sudah Transfer
                      </button>
                      <button onClick={() => {setCart([]); localStorage.removeItem('parfumCart'); setCurrentView('katalog');}} className="w-full bg-white border border-gray-300 text-gray-600 font-semibold py-3 px-4 rounded-xl hover:bg-gray-50 transition-colors">
                        Batal / Nanti Saja
                      </button>
                   </div>
                </div>
              </div>
            )}

          </main>

          {activeItem && (
            <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-in fade-in duration-200">
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden transform scale-100">
                <div className="flex justify-between items-center p-5 border-b border-gray-100 bg-gray-50">
                  <h3 className="font-bold text-gray-800 flex items-center gap-2"><ShoppingCart size={20} className="text-purple-600"/> Konfigurasi Parfum</h3>
                  <button onClick={() => setActiveItem(null)} className="text-gray-400 hover:text-gray-600 bg-gray-200/50 hover:bg-gray-200 p-1.5 rounded-full"><X size={20}/></button>
                </div>
                <div className="p-6">
                  <div className="mb-5 p-4 bg-purple-50 rounded-xl border border-purple-100">
                    <span className="inline-block px-2 py-1 bg-purple-200 text-purple-800 text-[10px] font-bold rounded mb-2 uppercase">{activeItem.category}</span>
                    <h4 className="font-bold text-purple-900 uppercase leading-snug">{activeItem.name}</h4>
                  </div>
                  <div className="space-y-4">
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-1.5">Ukuran (ML) <span className="text-red-500">*</span></label>
                      <select required value={formConfig.ml} onChange={(e) => setFormConfig({...formConfig, ml: e.target.value})} className="w-full bg-gray-50 border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-purple-500 focus:outline-none">
                        <option value="" disabled>Pilih Ukuran</option><option value="35">35 ML</option><option value="60">60 ML</option><option value="100">100 ML</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-sm font-semibold text-gray-700 mb-1.5">Kualitas <span className="text-red-500">*</span></label>
                      <select required value={formConfig.kualitas} onChange={(e) => setFormConfig({...formConfig, kualitas: e.target.value})} className="w-full bg-gray-50 border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-purple-500 focus:outline-none">
                        <option value="" disabled>Pilih Kualitas</option><option value="STANDAR">STANDAR</option><option value="SUPER">SUPER</option>
                      </select>
                    </div>
                    {formConfig.ml && formConfig.kualitas && (
                       <div className="mt-4 flex justify-between items-end border-t border-dashed border-gray-200 pt-4">
                          <span className="text-gray-500 text-sm font-medium">Harga per botol:</span>
                          <span className="text-2xl font-bold text-purple-700">{formatRp(pricingData[activeItem.category][formConfig.kualitas][formConfig.ml])}</span>
                       </div>
                    )}
                  </div>
                </div>
                <div className="p-5 border-t border-gray-100 bg-gray-50 flex gap-3">
                  <button onClick={() => setActiveItem(null)} className="flex-1 py-3 px-4 bg-white border border-gray-300 rounded-xl text-gray-700 font-semibold hover:bg-gray-50">Batal</button>
                  <button onClick={handleAddToCart} disabled={!formConfig.ml || !formConfig.kualitas} className={`flex-1 py-3 px-4 rounded-xl font-bold text-white shadow-md transition-all ${(!formConfig.ml || !formConfig.kualitas) ? 'bg-purple-300 cursor-not-allowed shadow-none' : 'bg-purple-600 hover:bg-purple-700 hover:shadow-lg'}`}>Tambah ke Keranjang</button>
                </div>
              </div>
            </div>
          )}

          {priceInfoCategory && (
             <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-in fade-in duration-200" onClick={() => setPriceInfoCategory(null)}>
               <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden" onClick={e => e.stopPropagation()}>
                 <div className={`${catalogData[priceInfoCategory].color} p-5 text-white flex justify-between items-center`}>
                    <h3 className="font-bold text-lg flex items-center gap-2"><Info size={20} /> Daftar Harga {priceInfoCategory}</h3>
                    <button onClick={() => setPriceInfoCategory(null)} className="hover:bg-black/20 p-1.5 rounded-full transition-colors"><X size={20}/></button>
                 </div>
                 <div className="p-6">
                    {['STANDAR', 'SUPER'].map((kualitas) => (
                       <div key={kualitas} className="mb-5 last:mb-0">
                          <div className="bg-gray-100 text-gray-600 text-xs font-bold px-3 py-1 inline-block rounded-full mb-3 uppercase tracking-wider">Kualitas {kualitas}</div>
                          <div className="space-y-2">
                             {['35', '60', '100'].map(ml => (
                                <div key={ml} className="flex justify-between items-center border-b border-gray-100 pb-2 text-sm">
                                   <span className="font-medium text-gray-700">{ml} ml</span>
                                   <span className="font-bold text-gray-900">{formatRp(pricingData[priceInfoCategory][kualitas][ml])}</span>
                                </div>
                             ))}
                          </div>
                       </div>
                    ))}
                 </div>
                 <div className="p-4 bg-gray-50 text-center">
                    <button onClick={() => setPriceInfoCategory(null)} className="text-purple-600 font-bold text-sm w-full py-2 hover:bg-purple-50 rounded-lg">Tutup</button>
                 </div>
               </div>
             </div>
          )}

          {toastMessage && (
            <div className="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl z-50 flex items-center gap-2 transition-all duration-300 animate-in slide-in-from-bottom-5">
              <CheckCircle2 size={20} className="text-green-400" />
              <span className="text-sm font-medium">{toastMessage}</span>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
