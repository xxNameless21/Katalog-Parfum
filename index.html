            const newCart = [...prevCart];
            newCart[existingItemIndex].quantity += 1;
            return newCart;

            return [...prevCart, { ...newItem, quantity: 1 }];

                        <ShoppingBag size={48} className="text-slate-300" />
                      </div>
                      <h3 className="text-2xl font-bold text-gray-800 mb-2">Keranjang Masih Kosong</h3>
                      <p className="text-gray-500 mb-8 max-w-sm">Eksplorasi koleksi parfum kami dan temukan aroma favorit Anda.</p>
                      <button onClick={() => setCurrentView('katalog')} className="bg-gray-900 hover:bg-black text-white font-semibold py-3.5 px-8 rounded-full transition-all shadow-lg hover:shadow-xl hover:-translate-y-0.5">
                        Kembali ke Katalog
                      </button>
                    </div>
                  ) : (
                    <div className="flex flex-col lg:flex-row">
                      {/* Daftar Item */}
                      <div className="flex-1 p-6 sm:p-8 lg:border-r border-gray-100 bg-white">
                        <div className="flex justify-between items-center mb-6 pb-4 border-b border-gray-100">
                          <h3 className="font-bold text-gray-800">Detail Produk ({totalCartItems})</h3>
                          <button onClick={() => {setCart([]); localStorage.removeItem('parfumCart')}} className="text-xs text-red-500 font-semibold hover:underline">Kosongkan</button>
                        </div>
                        
                        <div className="space-y-4 max-h-[60vh] overflow-y-auto pr-2">
                          {cart.map((item, index) => (
                            <div key={index} className="flex flex-col sm:flex-row gap-4 p-5 bg-white border border-gray-200 hover:border-purple-200 rounded-2xl relative group transition-colors shadow-sm hover:shadow-md">
                              <div className="flex-1">
                                <div className="text-[10px] font-bold text-purple-600 bg-purple-50 px-2 py-1 rounded inline-block mb-2 uppercase tracking-wide">{item.category}</div>
                                <h4 className="font-bold text-gray-900 text-sm sm:text-base uppercase leading-snug mb-1">{item.name}</h4>
                                <div className="text-xs text-gray-500 mb-3 font-medium flex gap-2">
                                  <span>Ukuran: <b className="text-gray-700">{item.ml}ml</b></span> • 
                                  <span>Kualitas: <b className="text-gray-700">{item.kualitas}</b></span>
                                </div>
                                <div className="text-purple-700 font-bold">
                                  {formatRp(item.price)} <span className="text-gray-400 font-normal text-xs">/ botol</span>
                                </div>
                              </div>
                              
                              <div className="flex sm:flex-col items-center sm:items-end justify-between mt-2 sm:mt-0 border-t sm:border-t-0 pt-3 sm:pt-0 border-gray-100">
                                <button onClick={() => removeItem(index)} className="text-gray-300 hover:text-red-500 p-2 sm:mb-2 transition-colors bg-gray-50 hover:bg-red-50 rounded-full">
                                  <Trash2 size={16} />
                                </button>
                                <div className="flex items-center bg-slate-50 border border-gray-200 rounded-xl p-1">
                                  <button onClick={() => updateQuantity(index, -1)} className="w-8 h-8 flex items-center justify-center hover:bg-white hover:shadow-sm text-gray-600 rounded-lg transition-all"><Minus size={14}/></button>
                                  <span className="w-8 text-center text-sm font-bold text-gray-800">{item.quantity}</span>
                                  <button onClick={() => updateQuantity(index, 1)} className="w-8 h-8 flex items-center justify-center hover:bg-white hover:shadow-sm text-gray-600 rounded-lg transition-all"><Plus size={14}/></button>
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* Ringkasan */}
                      <div className="w-full lg:w-[380px] p-6 sm:p-8 bg-slate-50/80">
                        <h3 className="font-bold text-gray-800 mb-6 pb-4 border-b border-gray-200">Ringkasan Belanja</h3>
                        
                        <div className="space-y-3 mb-6">
                           <div className="flex justify-between text-sm text-gray-500">
                             <span>Total Produk</span>
                             <span className="font-medium text-gray-800">{totalCartItems} item</span>
                           </div>
                           <div className="flex justify-between items-center pt-4 border-t border-gray-200 border-dashed">
                             <span className="text-gray-600 font-semibold">Total Tagihan</span>
                             <span className="text-2xl font-bold text-purple-700">{formatRp(totalCartPrice)}</span>
                           </div>
                        </div>

                        <form onSubmit={handleCheckout} className="space-y-5 bg-white p-5 rounded-2xl border border-gray-100 shadow-sm">
                          <div>
                            <label className="block text-xs font-bold tracking-wide text-gray-700 mb-2 uppercase">Nomor WhatsApp Anda <span className="text-red-500">*</span></label>
                            <div className="relative">
                               <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm font-bold">ID</span>
                               <input type="tel" required placeholder="081234567890" value={noHp} onChange={handlePhoneChange} className={`w-full bg-slate-50 border ${phoneError ? 'border-red-400 bg-red-50' : 'border-gray-200'} text-gray-900 font-medium rounded-xl py-3 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:bg-white transition-all`} />
                            </div>
                            {phoneError && <p className="text-red-500 text-xs mt-1.5 flex items-center gap-1"><Info size={12}/> {phoneError}</p>}
                          </div>
                          
                          <button type="submit" disabled={!!phoneError || noHp.length < 10 || isCheckingOut} className={`w-full font-bold py-4 px-4 rounded-xl shadow-lg flex justify-center items-center gap-2 transition-all duration-300 ${(phoneError || noHp.length < 10 || isCheckingOut) ? 'bg-gray-200 text-gray-400 cursor-not-allowed shadow-none' : 'bg-gray-900 hover:bg-black text-white hover:shadow-xl hover:-translate-y-0.5'}`}>
                            {isCheckingOut ? <><Loader2 size={18} /> Menyimpan...</> : 'Lanjutkan Pembayaran'}
                          </button>
                        </form>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* ====== TAMPILAN PEMBAYARAN TRANSFER BANK ====== */}
            {currentView === 'payment' && (
              <div className="max-w-lg mx-auto animate-in slide-in-from-bottom-8 duration-700 mt-4 pb-16">
                <div className="bg-white rounded-3xl shadow-2xl shadow-blue-900/10 overflow-hidden border border-gray-100">
                   {/* Header Payment */}
                   <div className="bg-gradient-to-br from-blue-600 to-indigo-700 p-8 text-center text-white relative overflow-hidden">
                      <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] opacity-20"></div>
                      <div className="w-16 h-16 bg-white/20 backdrop-blur-md rounded-full flex items-center justify-center mx-auto mb-4 border border-white/30 relative z-10">
                        <Landmark size={32} className="text-white" />
                      </div>
                      <h2 className="text-2xl font-serif font-bold mb-1 relative z-10">Transfer Bank</h2>
                      <p className="text-blue-100 text-sm relative z-10">Pesanan <b className="text-white">{orderId}</b> berhasil dicatat.</p>
                   </div>

                   <div className="p-8">
                      <div className="bg-slate-50 p-5 rounded-2xl mb-8 text-center border border-slate-200">
                         <p className="text-sm text-gray-500 font-medium mb-1 uppercase tracking-widest">Total Tagihan</p>
                         <p className="text-4xl font-extrabold text-gray-900">{formatRp(totalCartPrice)}</p>
                      </div>

                      <h3 className="text-sm font-bold text-gray-800 mb-4 uppercase tracking-wider flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-blue-500"></div> Tujuan Transfer</h3>
                      
                      <div className="space-y-4 mb-8">
                         {INFO_REKENING.map((acc, idx) => (
                           <div key={idx} className="bg-white border-2 border-slate-100 hover:border-blue-200 rounded-2xl p-5 shadow-sm transition-all flex justify-between items-center group">
                              <div>
                                 <div className="font-extrabold text-xl text-blue-800 tracking-tight mb-1">{acc.bank}</div>
                                 <div className="text-gray-900 font-mono text-lg tracking-widest font-bold">{acc.number}</div>
                                 <div className="text-gray-500 text-xs font-semibold mt-1 uppercase">A.N. {acc.name}</div>
                              </div>
                              <button 
                                onClick={() => copyToClipboard(acc.number)} 
                                className="p-3 bg-slate-50 hover:bg-blue-50 text-gray-400 hover:text-blue-600 rounded-xl transition-all flex flex-col items-center gap-1 border border-slate-200 group-hover:border-blue-200"
                                title="Salin Rekening"
                              >
                                 <Copy size={20} />
                                 <span className="text-[9px] font-bold uppercase tracking-wider">Salin</span>
                              </button>
                           </div>
                         ))}
                      </div>

                      <div className="space-y-3">
                         <button onClick={handleConfirmPayment} className="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-4 rounded-xl transition-all shadow-lg shadow-green-500/30 hover:shadow-xl flex items-center justify-center gap-2 text-lg">
                           <CheckCircle2 size={22} /> Konfirmasi via WhatsApp
                         </button>
                         <button onClick={() => {setCart([]); localStorage.removeItem('parfumCart'); setCurrentView('katalog');}} className="w-full bg-white text-gray-500 font-semibold py-3.5 px-4 rounded-xl hover:bg-gray-50 transition-colors">
                           Bayar Nanti (Kembali)
                         </button>
                      </div>
                   </div>
                </div>
              </div>
            )}

          </main>

          {/* ====== FOOTER ELEGAN ====== */}
          <footer className="bg-white border-t border-gray-200 mt-auto">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-12">
              <div className="grid grid-cols-1 md:grid-cols-3 gap-8 text-center md:text-left">
                <div>
                  <h2 className="text-2xl font-serif font-bold tracking-wide text-gray-900 mb-4">
                    <span className="text-purple-600">Jastip</span> Parfum
                  </h2>
                  <p className="text-gray-500 text-sm leading-relaxed max-w-xs mx-auto md:mx-0">
                    Penyedia layanan titip beli parfum original berkualitas standar dan super. Solusi tepat untuk menemukan aroma khas kepribadianmu.
                  </p>
                </div>
                <div>
                  <h4 className="font-bold text-gray-800 mb-4 uppercase tracking-wider text-sm">Layanan Kami</h4>
                  <ul className="space-y-2 text-sm text-gray-500">
                    <li>Katalog Lengkap</li>
                    <li>Pengiriman Cepat</li>
                    <li>Jaminan Kualitas</li>
                    <li>Konsultasi Aroma</li>
                  </ul>
                </div>
                <div>
                  <h4 className="font-bold text-gray-800 mb-4 uppercase tracking-wider text-sm">Hubungi Kami</h4>
                  <p className="text-sm text-gray-500 mb-2">WhatsApp: {ADMIN_WA_PHONE}</p>
                  <p className="text-sm text-gray-500 mb-4">Senin - Sabtu: 09.00 - 17.00 WIB</p>
                  <div className="flex justify-center md:justify-start gap-4">
                     <button onClick={handleCSWhatsApp} className="p-2 bg-slate-100 hover:bg-green-100 text-slate-500 hover:text-green-600 rounded-full transition-colors">
                       <MessageCircle size={20} />
                     </button>
                  </div>
                </div>
              </div>
              <div className="border-t border-gray-100 mt-8 pt-8 text-center text-xs text-gray-400">
                &copy; 2025 Jastip Parfum by chakas_mrl21. All rights reserved.
              </div>
            </div>
          </footer>

          {/* ====== MODAL: ADD TO CART ====== */}
          {activeItem && (
            <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-in fade-in duration-200">
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden transform scale-100 border border-white/20">
                <div className="flex justify-between items-center p-6 border-b border-gray-100">
                  <h3 className="font-bold text-gray-900 flex items-center gap-2 text-lg"><ShoppingCart size={20} className="text-purple-600"/> Opsi Produk</h3>
                  <button onClick={() => setActiveItem(null)} className="text-gray-400 hover:text-gray-800 bg-gray-100 hover:bg-gray-200 p-2 rounded-full transition-colors"><X size={18}/></button>
                </div>
                <div className="p-6">
                  <div className="mb-6 p-5 bg-gradient-to-r from-purple-50 to-indigo-50 rounded-2xl border border-purple-100/50">
                    <span className="inline-block px-2.5 py-1 bg-white text-purple-700 text-[10px] font-extrabold rounded-md mb-3 uppercase tracking-widest shadow-sm border border-purple-100">{activeItem.category}</span>
                    <h4 className="font-bold text-gray-900 uppercase leading-snug text-lg">{activeItem.name}</h4>
                  </div>
                  <div className="space-y-5">
                    <div>
                      <label className="block text-xs font-bold tracking-wide text-gray-600 mb-2 uppercase">Pilih Ukuran (ML)</label>
                      <div className="grid grid-cols-3 gap-3">
                        {['35', '60', '100'].map(val => (
                           <div 
                             key={val} 
                             onClick={() => setFormConfig({...formConfig, ml: val})}
                             className={`cursor-pointer border-2 rounded-xl py-3 text-center font-bold transition-all ${formConfig.ml === val ? 'border-purple-600 bg-purple-50 text-purple-700' : 'border-gray-200 text-gray-500 hover:border-purple-300'}`}
                           >
                             {val}ml
                           </div>
                        ))}
                      </div>
                    </div>
                    <div>
                      <label className="block text-xs font-bold tracking-wide text-gray-600 mb-2 uppercase">Kualitas Parfum</label>
                      <div className="grid grid-cols-2 gap-3">
                        {['STANDAR', 'SUPER'].map(val => (
                           <div 
                             key={val} 
                             onClick={() => setFormConfig({...formConfig, kualitas: val})}
                             className={`cursor-pointer border-2 rounded-xl py-3 text-center font-bold transition-all ${formConfig.kualitas === val ? 'border-purple-600 bg-purple-50 text-purple-700' : 'border-gray-200 text-gray-500 hover:border-purple-300'}`}
                           >
                             {val}
                           </div>
                        ))}
                      </div>
                    </div>
                    
                    {formConfig.ml && formConfig.kualitas && (
                       <div className="mt-2 flex justify-between items-end bg-gray-50 p-4 rounded-xl border border-gray-100 animate-in fade-in zoom-in-95 duration-200">
                          <span className="text-gray-500 text-sm font-semibold">Harga:</span>
                          <span className="text-2xl font-extrabold text-purple-700">{formatRp(pricingData[activeItem.category][formConfig.kualitas][formConfig.ml])}</span>
                       </div>
                    )}
                  </div>
                </div>
                <div className="p-6 border-t border-gray-100 bg-slate-50 flex gap-3">
                  <button onClick={handleAddToCart} disabled={!formConfig.ml || !formConfig.kualitas} className={`w-full py-4 px-4 rounded-xl font-bold text-white transition-all ${(!formConfig.ml || !formConfig.kualitas) ? 'bg-gray-300 cursor-not-allowed shadow-none' : 'bg-gray-900 hover:bg-black shadow-lg hover:shadow-xl hover:-translate-y-0.5'}`}>Masukkan Keranjang</button>
                </div>
              </div>
            </div>
          )}

          {/* ====== MODAL: TOOLTIP INFO HARGA ====== */}
          {priceInfoCategory && (
             <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-in fade-in duration-200" onClick={() => setPriceInfoCategory(null)}>
               <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden" onClick={e => e.stopPropagation()}>
                 <div className={`${catalogData[priceInfoCategory].colorClass} p-6 text-white flex justify-between items-center relative`}>
                    <div className="absolute top-0 right-0 w-full h-full bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10"></div>
                    <h3 className="font-bold text-lg flex items-center gap-2 relative z-10"><Info size={20} /> Daftar Harga {priceInfoCategory}</h3>
                    <button onClick={() => setPriceInfoCategory(null)} className="hover:bg-white/20 p-2 rounded-full transition-colors relative z-10"><X size={18}/></button>
                 </div>
                 <div className="p-6 bg-slate-50">
                    {['STANDAR', 'SUPER'].map((kualitas) => (
                       <div key={kualitas} className="mb-6 last:mb-0 bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                          <div className="bg-gray-100 text-gray-700 text-[10px] font-extrabold px-3 py-1 inline-block rounded-md mb-4 uppercase tracking-widest border border-gray-200">{kualitas}</div>
                          <div className="space-y-3">
                             {['35', '60', '100'].map(ml => (
                                <div key={ml} className="flex justify-between items-center border-b border-gray-50 pb-2 text-sm">
                                   <span className="font-semibold text-gray-500">{ml} ml</span>
                                   <span className="font-bold text-gray-900">{formatRp(pricingData[priceInfoCategory][kualitas][ml])}</span>
                                </div>
                             ))}
                          </div>
                       </div>
                    ))}
                 </div>
               </div>
             </div>
          )}

          {/* ====== TOMBOL WHATSAPP MELAYANG (FLOATING CS) ====== */}
          <button 
            onClick={handleCSWhatsApp}
            className="fixed bottom-6 right-6 z-40 bg-green-500 hover:bg-green-600 text-white p-4 rounded-full shadow-xl hover:shadow-2xl transition-all hover:-translate-y-1 flex items-center justify-center group"
            title="Chat dengan CS"
          >
            <MessageCircle size={28} />
            <span className="max-w-0 overflow-hidden whitespace-nowrap group-hover:max-w-xs transition-all duration-300 ease-in-out font-bold text-sm group-hover:ml-2 group-hover:mr-1">Chat Admin</span>
          </button>

          {/* ====== TOAST NOTIFICATION ====== */}
          {toastMessage && (
            <div className="fixed bottom-24 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white px-6 py-3.5 rounded-full shadow-2xl z-50 flex items-center gap-3 transition-all duration-300 animate-in slide-in-from-bottom-5">
              <CheckCircle2 size={20} className="text-green-400" />
              <span className="text-sm font-semibold tracking-wide">{toastMessage}</span>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
